services:
  polancowatch-api:
    build: 
      context: . 
      dockerfile: Dockerfile
    env_file:
      - path: ../.env
        required: false
    ports:
      - "${API_PORT:-5246}:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - JWT_KEY=${JWT_KEY:?JWT_KEY is required}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:-}
      - APP_URL=${APP_URL:-http://localhost:5173}
      - Cors__AllowedOrigins__0=${APP_URL:-http://localhost:5173}
      - BACKUP_HOST_PATH=${BACKUP_HOST_PATH:-polancowatch_backups}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - GOOGLE_DRIVE_CLIENT_ID=${GOOGLE_DRIVE_CLIENT_ID:-}
      - GOOGLE_DRIVE_CLIENT_SECRET=${GOOGLE_DRIVE_CLIENT_SECRET:-}
      - GOOGLE_DRIVE_REFRESH_TOKEN=${GOOGLE_DRIVE_REFRESH_TOKEN:-}
      - GOOGLE_DRIVE_REDIRECT_URI=${GOOGLE_DRIVE_REDIRECT_URI:-}
      - GOOGLE_DRIVE_DEFAULT_FOLDER_ID=${GOOGLE_DRIVE_DEFAULT_FOLDER_ID:-}
    
    # --- DOKPLOY METRICS MAGIC ---
    # This allows the container to see all processes on the real host (VPS)
    pid: "host"       
    
    # This provides access to advanced hardware metrics without Docker blocking it
    privileged: true  
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - polancowatch_db_data:/app/data
      - polancowatch_backups:/app/backups
    
    restart: unless-stopped

  polancowatch-frontend:
    env_file:
      - path: ../.env
        required: false
    build:
      context: ../PolancoWatch_frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5246}
    ports:
      - "${PORT:-5173}:80"
    depends_on:
      - polancowatch-api
    restart: unless-stopped

volumes:
  polancowatch_db_data:
  polancowatch_backups:
