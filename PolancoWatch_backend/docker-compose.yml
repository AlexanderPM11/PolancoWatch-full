services:
  polancowatch-api:
    build: 
      context: . 
      dockerfile: Dockerfile
    container_name: polancowatch_backend_core
    env_file:
      - path: ../.env
        required: false
    ports:
      - "${API_PORT:-5246}:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
    
    # --- DOKPLOY METRICS MAGIC ---
    # This allows the container to see all processes on the real host (VPS)
    pid: "host"       
    
    # This provides access to advanced hardware metrics without Docker blocking it
    privileged: true  
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - polancowatch_db_data:/app/data
      - polancowatch_backups:/app/backups
    
    restart: unless-stopped

  polancowatch-frontend:
    env_file:
      - path: ../.env
        required: false
    build:
      context: ../PolancoWatch_frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5246}
    container_name: polancowatch_frontend
    ports:
      - "${PORT:-5173}:80"
    depends_on:
      - polancowatch-api
    restart: unless-stopped

volumes:
  polancowatch_db_data:
    name: polancowatch_db_data
  polancowatch_backups:
    name: polancowatch_backups
